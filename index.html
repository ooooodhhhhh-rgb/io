                    text: "마세라티의 하이엔드 순수 전기차 라인업의 이름은 'Folgore'이며 이탈리아어로 '번개'를 뜻한다.",
                    image: "img/Image/Q7_2783526-l36aaj0k3p-whr.jpg",
                    correctAnswer: true,
                    userAnswer: null
                },
                {
                    question: "Q8.",
                    text: "현재 IFC 팝업에 전시되기도 한 마세라티 MC Pura는 슈퍼카 모델이다. 최고 속도는 325km/h 이상을 낼 수 있으며 100% 전기차 버전도 출시되었다.",
                    image: "img/Image/Q8_2931627-pfptw1sqk4-whr.jpg",
                    correctAnswer: true,
                    userAnswer: null
                },
                {
                    question: "Q9.",
                    text: "마세라티를 한 문장으로 표현한다면 레이싱 DNA를 가진 이탈리안 럭셔리 브랜드이다.",
                    image: "img/Image/Q9_f0f6f2b6cbced4b6d3549c6767ce6316552a67ad.jpeg",
                    correctAnswer: true,
                    userAnswer: null
                },
                {
                    question: "Q10.",
                    text: "마세라티 그레칼레는 스포티한 디자인과 럭셔리한 실내를 바탕으로 GT, 모데나, 트로페오(내연), 폴고레(전기)까지 전동화 라인업을 제공하는 중형 SUV이다.",
                    image: "img/Image/Q10_262800M.jpg",
                    correctAnswer: true,
                    userAnswer: null
                }
            ];
            console.log('Loaded quiz data:', quizData.length, 'questions');
        }

        function loadHeaderSettings() {
            const savedSettings = localStorage.getItem('maseratiHeaderSettings');
            if (savedSettings) {
                headerSettings = JSON.parse(savedSettings);
                console.log('Loaded header settings:', headerSettings);
            }
        }

        function updateHeaderElements() {
            // 모든 로고 이미지 업데이트
            const logos = document.querySelectorAll('.logo');
            logos.forEach(logo => {
                logo.src = headerSettings.logoUrl;
            });

            // 모든 브랜드명 업데이트
            const brandNames = document.querySelectorAll('.brand-name');
            brandNames.forEach(name => {
                name.textContent = headerSettings.brandName;
            });

            // 모든 타이틀 업데이트
            const titles = document.querySelectorAll('.title');
            titles.forEach(title => {
                title.textContent = headerSettings.headerTitle;
            });
        }

        loadQuizData();
        loadHeaderSettings();
        updateHeaderElements();

        let currentQuiz = 0;
        let correctCount = 0;

        function startQuiz() {
            console.log('Start Quiz clicked');
            const startScreen = document.getElementById('startScreen');
            const quizScreen = document.getElementById('quizScreen');
            
            startScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            
            // 초기화
            currentQuiz = 0;
            correctCount = 0;
            quizData.forEach(q => q.userAnswer = null);
            
            showQuiz(0);
        }

        function showQuiz(index) {
            console.log('showQuiz called with index:', index);
            if (index >= quizData.length) {
                showComplete();
                return;
            }

            currentQuiz = index;
            const quiz = quizData[index];
            const container = document.getElementById('quizContainer');
            
            console.log('Showing quiz:', quiz);

            container.innerHTML = `
                <div class="quiz-item quiz-left">
                    <img src="${quiz.image}" alt="Quiz Image" class="quiz-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22%3E%3Crect fill=%22%23111%22 width=%22400%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2220%22 fill=%22%23666%22%3EImage%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="quiz-item quiz-right">
                    <div class="question-number">${quiz.question}</div>
                    <div class="question-text">${quiz.text}</div>
                    <div class="quiz-buttons">
                        <button class="quiz-button" onclick="answerQuiz(true)">YES</button>
                        <button class="quiz-button" onclick="answerQuiz(false)">NO</button>
                    </div>
                </div>
            `;
        }

        function answerQuiz(answer) {
            console.log('Answer:', answer);
            quizData[currentQuiz].userAnswer = answer;
            
            // 정답 확인
            if (answer === quizData[currentQuiz].correctAnswer) {
                correctCount++;
            }
            
            showQuiz(currentQuiz + 1);
        }

        function showComplete() {
            console.log('Showing complete screen');
            const quizScreen = document.getElementById('quizScreen');
            const completeScreen = document.getElementById('completeScreen');
            const scoreDisplay = document.getElementById('scoreDisplay');
            
            quizScreen.style.display = 'none';
            completeScreen.style.display = 'flex';
            
            scoreDisplay.textContent = `총 ${quizData.length}문제 중 ${correctCount}문제를 맞추셨습니다!`;
            showRandomImage();
        }

        function restartQuiz() {
            console.log('Restart quiz');
            const completeScreen = document.getElementById('completeScreen');
            const startScreen = document.getElementById('startScreen');
            
            completeScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            
            // 초기화
            currentQuiz = 0;
            correctCount = 0;
            quizData.forEach(q => q.userAnswer = null);
        }

        // 페이지 로드 확인
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM fully loaded');
        });
 
        function showCompleteScreen() {
            document.getElementById("completeScreen").style.display = "block";
            showRandomImage();
        }
 
        function showRandomImage() {
            
            const random = Math.random();
            const imgElement = document.getElementById("rewardImage");

            if (random < 0.6) {
                // 60%
                imgElement.src = "./img/Image/tag.jpg";
            } else {
                // 40%
                imgElement.src = "./img/Image/cup.png";
            }
        }
    </script>
</body>
</html>
