<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASERATI QUIZ - 관리자 페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            padding: 20px;
            min-height: 100vh;
            overflow-y: auto;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            max-height: 100vh;
            overflow-y: auto;
            padding: 20px 0;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            color: #d4af37;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        .btn-primary {
            background: #4169e1;
            border-color: #4169e1;
        }

        .btn-primary:hover {
            background: #5179f1;
            border-color: #5179f1;
        }

        .btn-success {
            background: #2d8659;
            border-color: #2d8659;
        }

        .btn-success:hover {
            background: #3d9669;
            border-color: #3d9669;
        }

        .btn-danger {
            background: #c41e3a;
            border-color: #c41e3a;
        }

        .btn-danger:hover {
            background: #d42e4a;
            border-color: #d42e4a;
        }

        .quiz-list {
            display: grid;
            gap: 20px;
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 20px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .quiz-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .quiz-image-preview {
            width: 100px;
            height: 75px;
            object-fit: cover;
            border-radius: 8px;
            background: #000;
        }

        .quiz-content {
            flex: 1;
        }

        .quiz-question {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #d4af37;
        }

        .quiz-text {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.85;
            margin-bottom: 10px;
        }

        .quiz-answer {
            font-size: 13px;
            color: #4169e1;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .btn-small {
            padding: 8px 20px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: #4169e1;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-label input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .image-preview-container {
            margin-top: 15px;
        }

        .image-preview-large {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.5;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .quiz-card {
                grid-template-columns: 1fr;
            }

            .quiz-image-preview {
                width: 100%;
                height: 150px;
            }

            .quiz-actions {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>MASERATI QUIZ</h1>
        <div class="subtitle">관리자 페이지</div>

        <div class="action-buttons">
            <button class="btn" onclick="openSettingsModal()">⚙️ 헤더 설정</button>
            <button class="btn btn-primary" onclick="openAddModal()">➕ 새 퀴즈 추가</button>
            <button class="btn" onclick="loadDefaultQuiz()">📋 기본 퀴즈 불러오기</button>
            <button class="btn btn-success" onclick="saveToFile()">💾 데이터 저장</button>
            <button class="btn" onclick="loadFromFile()">📂 데이터 불러오기</button>
            <button class="btn" onclick="viewQuiz()">👁️ 퀴즈 미리보기</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ 전체 삭제</button>
        </div>

        <div class="quiz-list" id="quizList"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">등록된 퀴즈가 없습니다.<br>새 퀴즈를 추가해보세요.</div>
        </div>
    </div>

    <!-- 퀴즈 추가/수정 모달 -->
    <div class="modal" id="quizModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">새 퀴즈 추가</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <form id="quizForm" onsubmit="saveQuiz(event)">
                <div class="form-group">
                    <label class="form-label">문제 번호</label>
                    <input type="text" class="form-input" id="questionNumber" placeholder="예: Q1." required>
                </div>

                <div class="form-group">
                    <label class="form-label">문제 내용</label>
                    <textarea class="form-textarea" id="questionText" placeholder="퀴즈 문제를 입력하세요" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">이미지 선택</label>
                    <input type="file" class="form-input" id="imageFile" accept="image/*" onchange="handleImageUpload(event)" style="padding: 8px 15px;">
                    <small style="display: block; margin-top: 8px; opacity: 0.6; font-size: 12px;">
                        이미지 파일을 선택하면 자동으로 저장됩니다 (또는 아래 URL 입력)
                    </small>
                </div>

                <div class="form-group">
                    <label class="form-label">또는 이미지 URL 직접 입력</label>
                    <input type="text" class="form-input" id="imageUrl" placeholder="https://... 또는 img/파일명.jpg" onchange="previewImageUrl()">
                    <div class="image-preview-container">
                        <img id="imagePreview" class="image-preview-large" style="display: none;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">정답</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="correctAnswer" value="true" required> YES (맞음)
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="correctAnswer" value="false"> NO (틀림)
                        </label>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <button type="button" class="btn" onclick="closeModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="handleFileSelect(event)">

    <!-- 헤더 설정 모달 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">헤더 설정</h2>
                <button class="close-btn" onclick="closeSettingsModal()">&times;</button>
            </div>

            <form id="settingsForm" onsubmit="saveSettings(event)">
                <div class="form-group">
                    <label class="form-label">로고 이미지</label>
                    <input type="file" class="form-input" id="logoFile" accept="image/*" onchange="handleLogoUpload(event)" style="padding: 8px 15px;">
                    <small style="display: block; margin-top: 8px; opacity: 0.6; font-size: 12px;">
                        또는 아래에 로고 URL을 직접 입력하세요
                    </small>
                </div>

                <div class="form-group">
                    <label class="form-label">로고 URL</label>
                    <input type="text" class="form-input" id="logoUrl" placeholder="img/logo.svg 또는 https://...">
                    <div class="image-preview-container">
                        <img id="logoPreview" class="image-preview-large" style="display: none; max-height: 150px;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">브랜드명</label>
                    <input type="text" class="form-input" id="brandName" placeholder="예: Maserati" value="Maserati">
                </div>

                <div class="form-group">
                    <label class="form-label">타이틀</label>
                    <input type="text" class="form-input" id="headerTitle" placeholder="예: LA CASA DI MASERATI" value="LA CASA DI MASERATI">
                </div>

                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <button type="button" class="btn" onclick="closeSettingsModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let quizData = [];
        let editingIndex = -1;
        let headerSettings = {
            logoUrl: 'img/trident_mobile_white.svg',
            brandName: 'Maserati',
            headerTitle: 'LA CASA DI MASERATI'
        };

        // 초기 로드
        loadQuizData();
        loadHeaderSettings();
        renderQuizList();

        function loadQuizData() {
            const savedData = localStorage.getItem('maseratiQuizData');
            if (savedData) {
                quizData = JSON.parse(savedData);
            } else {
                // 기본 퀴즈 데이터 (이미지 참고)
                quizData = [
                    {
                        question: "Q1.",
                        text: "마세라티의 상징인 트라이던트는 이탈리아의 유서깊은 마조레광장의 넵튠 분수의 삼지창에서 유래되었다.",
                        image: "",
                        correctAnswer: true,
                        userAnswer: null
                    },
                    {
                        question: "Q2.",
                        text: "이탈리아 모데나에 위치한 프리미어 자동차 제조사인 마세라티는 올해로 112주년을 맞이하였다.",
                        image: "",
                        correctAnswer: true,
                        userAnswer: null
                    },
                    {
                        question: "Q3.",
                        text: "마세라티의 하이브리드 순수 전기차 라인업의 이름은 'Folgore'이며 이탈리아어로 '번개'를 뜻한다.",
                        image: "",
                        correctAnswer: true,
                        userAnswer: null
                    }
                ];
                // 기본 데이터 저장
                saveQuizData();
            }
        }

        function saveQuizData() {
            localStorage.setItem('maseratiQuizData', JSON.stringify(quizData));
        }

        function loadDefaultQuiz() {
            if (quizData.length > 0) {
                if (!confirm('기존 퀴즈를 모두 삭제하고 기본 퀴즈를 불러오시겠습니까?')) {
                    return;
                }
            }

            // 기본 퀴즈 데이터
            quizData = [
                {
                    question: "Q1.",
                    text: "마세라티의 상징인 트라이던트는 이탈리아의 유서깊은 마조레광장의 넵튠 분수의 삼지창에서 유래되었다.",
                    image: "",
                    correctAnswer: true,
                    userAnswer: null
                },
                {
                    question: "Q2.",
                    text: "이탈리아 모데나에 위치한 프리미어 자동차 제조사인 마세라티는 올해로 112주년을 맞이하였다.",
                    image: "",
                    correctAnswer: true,
                    userAnswer: null
                },
                {
                    question: "Q3.",
                    text: "마세라티의 하이브리드 순수 전기차 라인업의 이름은 'Folgore'이며 이탈리아어로 '번개'를 뜻한다.",
                    image: "",
                    correctAnswer: true,
                    userAnswer: null
                }
            ];
            
            saveQuizData();
            renderQuizList();
            alert('기본 퀴즈 3개가 추가되었습니다!\n각 퀴즈를 수정해서 이미지를 추가해주세요.');
        }

        function loadHeaderSettings() {
            const savedSettings = localStorage.getItem('maseratiHeaderSettings');
            if (savedSettings) {
                headerSettings = JSON.parse(savedSettings);
            }
        }

        function saveHeaderSettings() {
            localStorage.setItem('maseratiHeaderSettings', JSON.stringify(headerSettings));
        }

        function renderQuizList() {
            const listElement = document.getElementById('quizList');
            const emptyState = document.getElementById('emptyState');

            if (quizData.length === 0) {
                listElement.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            listElement.style.display = 'grid';
            emptyState.style.display = 'none';

            listElement.innerHTML = quizData.map((quiz, index) => `
                <div class="quiz-card">
                    <img src="${quiz.image || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 90%22%3E%3Crect fill=%22%23111%22 width=%22120%22 height=%2290%22/%3E%3C/svg%3E'}" 
                         class="quiz-image-preview" 
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 90%22%3E%3Crect fill=%22%23111%22 width=%22120%22 height=%2290%22/%3E%3C/svg%3E'">
                    <div class="quiz-content">
                        <div class="quiz-question">${quiz.question}</div>
                        <div class="quiz-text">${quiz.text}</div>
                        <div class="quiz-answer">
                            ✓ 정답: ${quiz.correctAnswer ? 'YES (맞음)' : 'NO (틀림)'}
                        </div>
                    </div>
                    <div class="quiz-actions">
                        <button class="btn btn-small" onclick="editQuiz(${index})">수정</button>
                        <button class="btn btn-danger btn-small" onclick="deleteQuiz(${index})">삭제</button>
                        <button class="btn btn-small" onclick="moveUp(${index})" ${index === 0 ? 'disabled' : ''}>▲</button>
                        <button class="btn btn-small" onclick="moveDown(${index})" ${index === quizData.length - 1 ? 'disabled' : ''}>▼</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = '새 퀴즈 추가';
            document.getElementById('quizForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageFile').value = '';
            document.getElementById('quizModal').classList.add('active');
        }

        function editQuiz(index) {
            editingIndex = index;
            const quiz = quizData[index];
            
            document.getElementById('modalTitle').textContent = '퀴즈 수정';
            document.getElementById('questionNumber').value = quiz.question;
            document.getElementById('questionText').value = quiz.text;
            document.getElementById('imageUrl').value = quiz.image || '';
            
            const radios = document.querySelectorAll('input[name="correctAnswer"]');
            radios.forEach(radio => {
                radio.checked = radio.value === String(quiz.correctAnswer);
            });

            if (quiz.image) {
                const preview = document.getElementById('imagePreview');
                preview.src = quiz.image;
                preview.style.display = 'block';
            }

            document.getElementById('quizModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('quizModal').classList.remove('active');
            document.getElementById('imageFile').value = '';
            editingIndex = -1;
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 파일 타입 확인
            if (!file.type.startsWith('image/')) {
                alert('이미지 파일만 선택할 수 있습니다.');
                event.target.value = '';
                return;
            }

            // 파일 크기 확인 (10MB 제한)
            if (file.size > 10 * 1024 * 1024) {
                alert('파일 크기는 10MB 이하여야 합니다.\n큰 이미지는 압축해서 사용해주세요.');
                event.target.value = '';
                return;
            }

            // Base64로 변환하여 저장
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                
                // 이미지 URL 필드에 Base64 데이터 설정
                document.getElementById('imageUrl').value = dataUrl;
                
                // 미리보기
                const preview = document.getElementById('imagePreview');
                preview.src = dataUrl;
                preview.style.display = 'block';

                // 사용자에게 안내
                console.log(`이미지 로드 완료: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`);
            };
            reader.readAsDataURL(file);
        }

        function previewImageUrl() {
            const url = document.getElementById('imageUrl').value;
            const preview = document.getElementById('imagePreview');
            
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        function saveQuiz(event) {
            event.preventDefault();

            const quizItem = {
                question: document.getElementById('questionNumber').value,
                text: document.getElementById('questionText').value,
                image: document.getElementById('imageUrl').value,
                correctAnswer: document.querySelector('input[name="correctAnswer"]:checked').value === 'true',
                userAnswer: null
            };

            if (editingIndex >= 0) {
                quizData[editingIndex] = quizItem;
            } else {
                quizData.push(quizItem);
            }

            saveQuizData();
            renderQuizList();
            closeModal();

            alert(editingIndex >= 0 ? '퀴즈가 수정되었습니다!' : '새 퀴즈가 추가되었습니다!');
        }

        function deleteQuiz(index) {
            if (confirm('이 퀴즈를 삭제하시겠습니까?')) {
                quizData.splice(index, 1);
                saveQuizData();
                renderQuizList();
            }
        }

        function moveUp(index) {
            if (index > 0) {
                [quizData[index], quizData[index - 1]] = [quizData[index - 1], quizData[index]];
                saveQuizData();
                renderQuizList();
            }
        }

        function moveDown(index) {
            if (index < quizData.length - 1) {
                [quizData[index], quizData[index + 1]] = [quizData[index + 1], quizData[index]];
                saveQuizData();
                renderQuizList();
            }
        }

        function clearAll() {
            if (confirm('모든 퀴즈를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
                if (confirm('정말로 삭제하시겠습니까?')) {
                    quizData = [];
                    saveQuizData();
                    renderQuizList();
                    alert('모든 퀴즈가 삭제되었습니다.');
                }
            }
        }

        function saveToFile() {
            const dataStr = JSON.stringify(quizData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = `maserati-quiz-${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
            
            URL.revokeObjectURL(url);
            alert('퀴즈 데이터가 파일로 저장되었습니다!');
        }

        function loadFromFile() {
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        if (confirm('파일에서 불러온 데이터로 현재 데이터를 덮어쓰시겠습니까?')) {
                            quizData = data;
                            saveQuizData();
                            renderQuizList();
                            alert('퀴즈 데이터를 불러왔습니다!');
                        }
                    } else {
                        alert('올바르지 않은 파일 형식입니다.');
                    }
                } catch (error) {
                    alert('파일을 읽는 중 오류가 발생했습니다.');
                }
            };
            reader.readAsText(file);
            
            // 파일 입력 초기화
            event.target.value = '';
        }

        function viewQuiz() {
            if (quizData.length === 0) {
                alert('등록된 퀴즈가 없습니다.');
                return;
            }
            window.open('index.html', '_blank');
        }

        // 헤더 설정 모달
        function openSettingsModal() {
            document.getElementById('logoUrl').value = headerSettings.logoUrl;
            document.getElementById('brandName').value = headerSettings.brandName;
            document.getElementById('headerTitle').value = headerSettings.headerTitle;
            
            const logoPreview = document.getElementById('logoPreview');
            if (headerSettings.logoUrl) {
                logoPreview.src = headerSettings.logoUrl;
                logoPreview.style.display = 'block';
            }
            
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
            document.getElementById('logoFile').value = '';
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('이미지 파일만 선택할 수 있습니다.');
                event.target.value = '';
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('파일 크기는 5MB 이하여야 합니다.');
                event.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                document.getElementById('logoUrl').value = dataUrl;
                
                const preview = document.getElementById('logoPreview');
                preview.src = dataUrl;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function saveSettings(event) {
            event.preventDefault();

            headerSettings = {
                logoUrl: document.getElementById('logoUrl').value,
                brandName: document.getElementById('brandName').value,
                headerTitle: document.getElementById('headerTitle').value
            };

            saveHeaderSettings();
            closeSettingsModal();
            alert('헤더 설정이 저장되었습니다!');
        }

        // 키보드 단축키
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeSettingsModal();
            }
        });
    </script>
</body>
</html>
